name: 购物场景
url: http://localhost:4173/#/login

steps:
# 登录
  - 在'请输入手机号'输入框输入：'15373137739'
  - 在'请输入密码'输入框输入：'123456'
  - 点击'登录'按钮
  - 断言页面包含文本 "15373137739"

# 进入收货地址页
  - 鼠标悬浮在页面右上角的用户菜单按钮 "15373137739" 上
  - 等待菜单中 "收货地址" 选项出现
  - 点击菜单中的 "收货地址" 选项

  # 进入添加地址页
  - 点击 "添加新地址" 按钮

  # 填写地址表单 — 基本信息
  - 在 "收件人" 输入框输入 "张三"
  - 在 "联系电话" 输入框输入 "15373137739"

  # 省份
  - 点击省份下拉框
  - 在弹出选项中点击 "广东省"

  # 城市
  - 点击城市下拉框
  - 在弹出选项中点击 "深圳市"

  # 区县
  - 点击区县下拉框
  - 在弹出选项中点击 "罗湖区"

  # 详细地址
  - 在 "详细地址" 输入框输入 "城隍庙43号"

  # 保存
  - 点击 "保存地址" 按钮

  # 选择商品加入购物车
  - 点击 "全部商品分类"
  - 点击分类为 "家电 数码 手机"
  - 在商品预览页中筛选出的商品卡片中点击第一个 "小米 Redmi AirDots"
  - 在商品详情页点击 "加入购物车"
  - 点击页面右上角的 "购物车" 图标

  # 结算
  - 点击 "结算"
  - 点击 "提交订单"
  - 关闭 "选择支付方式"
  - 点击 "我的订单"
  - 点击 "待支付" 订单
  - 点击 "立即支付"
  - 点击 "支付宝支付"
  - 断言 "待支付" 不包含 "小米 Redmi AirDots"
