name: 新增收货地址流程
url: http://localhost:4173/

steps:
  # 登录
  - 点击页面顶部的 "登录" 链接
  - 点击切换到 "登录" 标签页
  - 在登录表单的 "请输入手机号" 输入框输入 "15373137739"
  - 在登录表单的 "请输入密码" 输入框输入 "123456"
  - 点击登录表单底部的 "登录" 按钮

  # 进入收货地址页
  - 鼠标悬浮在页面右上角的用户菜单按钮 "15373137739" 上
  - 等待菜单中 "收货地址" 选项出现
  - 点击菜单中的 "收货地址" 选项

  # 进入添加地址页
  - 点击 "添加新地址" 按钮

  # 填写地址表单 — 基本信息
  - 在 "收件人" 输入框输入 "张三"
  - 在 "联系电话" 输入框输入 "15373137739"

  # 省份 (Element Plus select 需要拆成 2 步: 点开 + 选项)
  - 点击省份下拉框
  - 在弹出选项中点击 "广东省"

  # 城市
  - 点击城市下拉框
  - 在弹出选项中点击 "深圳市"

  # 区县
  - 点击区县下拉框
  - 在弹出选项中点击 "罗湖区"

  # 详细地址
  - 在 "详细地址" 输入框输入 "城隍庙43号"

  # 保存
  - 点击 "保存地址" 按钮
